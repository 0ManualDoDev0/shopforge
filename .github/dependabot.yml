version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 10
    groups:
      eslint:
        patterns:
          - "eslint*"
          - "@typescript-eslint/*"
      tailwind:
        patterns:
          - "tailwindcss*"
          - "@tailwindcss/*"
      radix:
        patterns:
          - "@radix-ui/*"
      prisma:
        patterns:
          - "prisma"
          - "@prisma/*"
    ignore:
      - dependency-name: "next-auth"
        versions: ["4.x"]
